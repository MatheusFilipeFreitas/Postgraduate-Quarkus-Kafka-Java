services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka..."
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic paymentsConfirmed --bootstrap-server kafka:29092
    restart: "no"

  mysql:
    image: mysql:8.4
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  orders:
    build:
      context: .
      dockerfile: docker/Dockerfile.quarkus-service
      args:
        SERVICE_DIR: orders
    container_name: orders
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: docker
    depends_on:
      mysql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  payments:
    build:
      context: .
      dockerfile: docker/Dockerfile.quarkus-service
      args:
        SERVICE_DIR: payments
    container_name: payments
    ports:
      - "8081:8081"
    environment:
      QUARKUS_PROFILE: docker
    depends_on:
      mysql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  invoices:
    build:
      context: .
      dockerfile: docker/Dockerfile.quarkus-service
      args:
        SERVICE_DIR: invoices
    container_name: invoices
    ports:
      - "8082:8082"
    environment:
      QUARKUS_PROFILE: docker
    depends_on:
      orders:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  signer:
    build:
      context: .
      dockerfile: docker/Dockerfile.quarkus-service
      args:
        SERVICE_DIR: signer
    container_name: signer
    ports:
      - "8083:8083"
    environment:
      QUARKUS_PROFILE: docker
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped
